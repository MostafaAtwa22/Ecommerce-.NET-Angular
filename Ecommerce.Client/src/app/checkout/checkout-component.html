<div class="checkout-container">
  <div class="checkout-grid">
    <div class="checkout-main">
      <app-stepper-component [linearModeSelected]="false" #appStepper [addressStepValid]="addressStepValid"
        [deliveryStepValid]="deliveryStepValid" [paymentStepValid]="paymentStepValid"
        [addressStepAttempted]="addressStepAttempted" [deliveryStepAttempted]="deliveryStepAttempted"
        [paymentStepAttempted]="paymentStepAttempted" [addressForm]="addressForm" [deliveryForm]="deliveryForm"
        [paymentIntentCreated]="paymentIntentCreated" [paymentComponent]="paymentComponentRef"
        [continuePermission]="'Permissions.Orders.Create'" [submitPermission]="'Permissions.Orders.Create'"
        (stepChange)="onStepChange()" [createPaymentIntent]="createPaymentIntent.bind(this)">
        <cdk-step [label]="'Address'">
          <app-checkout-address-component [addressForm]="addressForm">
          </app-checkout-address-component>
        </cdk-step>
        <cdk-step [label]="'Delivery'">
          <app-checkout-delievery-component [checkoutForm]="deliveryForm">
          </app-checkout-delievery-component>
        </cdk-step>
        <cdk-step [label]="'Review'">
          <app-checkout-review-component></app-checkout-review-component>
        </cdk-step>
        <cdk-step [label]="'Payment'">
          <app-checkout-payment-component #paymentComponentRef [paymentForm]="paymentForm">
          </app-checkout-payment-component>
        </cdk-step>
      </app-stepper-component>
    </div>
    <div class="checkout-sidebar">
      <app-order-totals-component></app-order-totals-component>
    </div>
  </div>
</div>
