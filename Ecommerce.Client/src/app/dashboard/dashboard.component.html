<!-- Sidebar -->
<div class="sidebar" [class.active]="isSidebarActive" style="margin-top: 80px !important;">
  <a class="logo" style="cursor: pointer" (click)="toggleSidebar()">
    <i class="fa-solid fa-chart-simple"></i>
    <span>Admin<span>Panel</span></span>
  </a>

  <ul class="side-menu">
    <li>
      <a routerLink="./" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" style="cursor: pointer">
        <i class="fa-solid fa-gauge"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li *hasPermission="'Permissions.Products.Read'">
      <a routerLink="/dashboard/products" routerLinkActive="active" style="cursor: pointer">
        <i class="fa-solid fa-box"></i>
        <span>Products</span>
      </a>
    </li>
    <li *hasPermission="'Permissions.Orders.Read'">
      <a routerLink="/dashboard/orders" routerLinkActive="active" style="cursor: pointer">
        <i class="fa-solid fa-shopping-cart"></i>
        <span>Orders</span>
      </a>
    </li>
    <li *hasPermission="'Permissions.DeliveryMethods.Read'">
      <a routerLink="/dashboard/delivery" routerLinkActive="active" style="cursor: pointer">
        <i class="fa fa-truck"></i>
        <span>Delivery</span>
      </a>
    </li>
    <li *hasPermission="'Permissions.Account.Read'">
      <a routerLink="/dashboard/users" routerLinkActive="active" style="cursor: pointer">
        <i class="fa-solid fa-users"></i>
        <span>Users</span>
      </a>
    </li>
    <li *ngIf="isAdminOrSuperAdmin()">
      <a routerLink="/dashboard/chat" routerLinkActive="active" style="cursor: pointer">
        <i class="fa fa-comments"></i>
        <span>Chat</span>
      </a>
    </li>
    <li *hasPermission="'Permissions.Coupons.Read'">
      <a routerLink="/dashboard/coupons" routerLinkActive="active" style="cursor: pointer">
        <i class="fas fa-ticket-alt"></i>
        <span>Coupons</span>
      </a>
    </li>
    <li *hasPermission="'Permissions.Roles.Read'">
      <a routerLink="/dashboard/roles" routerLinkActive="active" style="cursor: pointer">
        <i class="fa-solid fa-user-shield"></i>
        <span>Roles</span>
      </a>
    </li>

    <li class="logout" (click)="logout()" style="cursor: pointer;">
      <a>
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Logout</span>
      </a>
    </li>
  </ul>
</div>

<div class="content">
  <router-outlet></router-outlet>
</div>
